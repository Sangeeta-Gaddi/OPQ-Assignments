<!-- 1. <hr> tag:
The <hr> tag is used to create a horizontal line on a web page.
It helps separate content or show a change of topic.

1.hr stands for horizontal rule
2.It is a self-closing tag (no closing tag needed)
3.It is a semantic tag in HTML5, meaning it shows a thematic break(a visible and meaningful separation between two topics or sections of content.) -->



<!-- 2. HTML Entites:
-> HTML entities are used to display reserved symbols or special characters in a web page that HTML would otherwise misunderstand.
-> Some characters have special meaning in HTML, so we replace them with entities to show them correctly.
-> HTML entities will safely show special characters as text without breaking HTML.
-> Common HTML Entities:

1. '<'      '&lt;'  
2. '>'      '&gt;'
3. '&'      '&amp;'
4. '"'      '&quot;' -->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hr tag and HTML ENtities</title>
</head>
<body>
    <p>This is the first paragraph.</p>

    <hr>

    <p>This is the second paragraph.</p>

    <br><br>

    <p>5 &lt; 10</p>
    <p>10 &gt; 5</p>
    <p>Tom &amp; Jerry</p>
    <p>He said &quot;Hello World!&quot;</p>
   
</body>
</html>
