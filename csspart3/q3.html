<!-- Qs3. Create a list of technologies- HTML, CSS, JavaScript, NodeJS, ReactJS, SQL,
MongoDB, Java, C++, C & Python.
Now change the display of all list items to inline to move them all in a single line.

Did you notice something different? Try to find why the bullet points disappear
--: Bullets disappear because when we change display from list-item to inline, the bullet feature is removed, 
as bullets are part of the list-item display type.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Assignment Part3</title>
    <style>
        li{
            display: inline;
        }
    </style>
</head>
<body>
    <h3>List of Technologiess</h3>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
        <li>NodeJS</li>
        <li>ReactJS</li>
        <li>SQL</li>
        <li>MongoDB</li>
        <li>Java</li>
        <li>C++</li>
        <li>C</li>
        <li>Python</li>
    </ul>
</body>
</html>
