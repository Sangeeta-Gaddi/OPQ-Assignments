 <!-- Q3. Recreate the following form using HTML  -->

 
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
 </head>
 <body>

    <h2>Feedback Form</h2>

<form>
   
    <label>Name:</label>
    <input type="text" placeholder="Write your name">
    <br><br>

  
    <label>Email:</label>
    <input type="email" placeholder="Write your email">
    <br><br>

   
    <label>Message:</label><br>
    <textarea rows="5" cols="40"></textarea>
    <br><br>

   
    <label>Rate us out of 5:</label><br>
    <input type="radio" name="rate"> 1<br>
    <input type="radio" name="rate"> 2<br>
    <input type="radio" name="rate"> 3<br>
    <input type="radio" name="rate"> 4<br>
    <input type="radio" name="rate"> 5
    <br><br>

    
    <button type="submit">Send your message!</button>
</form>

</body>
 </body>
 </html>
